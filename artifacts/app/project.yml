name: HaoYunDiary
options:
  bundleIdPrefix: com.sheldon
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Release
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_LANGUAGE: zh-Hant
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  HaoYunDiary:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        includes:
          - "**/*.swift"
        excludes:
          - "Tests/**"
          - "build/**"
          - "HaoYunDiary.xcodeproj/**"
          - "Package.swift"
      - path: Resources
        buildPhase: resources
        includes:
          - "**/*.xcstrings"
          - "**/*.xcassets"
          - "PrivacyInfo.xcprivacy"
    resources:
      - path: Resources/PrivacyInfo.xcprivacy
      - path: Resources/Localizable.xcstrings
        optional: true
      - path: Resources/Assets.xcassets
        optional: true
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh-Hant
        CFBundleDisplayName: 好孕日記
        CFBundleShortVersionString: "1.0.3"
        CFBundleVersion: "4"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleLocalizations:
          - zh-Hant
          - en
        NSUserNotificationsUsageDescription: 用來提醒您按時施打排卵針與回診。
        LSApplicationQueriesSchemes:
          - line
        ClinicLineOAID: "@haoyunclinic"
        ClinicWebBookingURL: "https://haoyun.example.tw/booking"
        ClinicDisplayName: 好孕台中診所
        SubsidyRulesVersion: "2026-04"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sheldon.haoyundiary
        PRODUCT_NAME: HaoYunDiary
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

  HaoYunDiaryUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
        includes:
          - "**/*.swift"
    dependencies:
      - target: HaoYunDiary
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sheldon.haoyundiary.uitests
        TEST_TARGET_NAME: HaoYunDiary
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

schemes:
  HaoYunDiary:
    build:
      targets:
        HaoYunDiary: all
        HaoYunDiaryUITests: [test]
    run:
      config: Debug
      commandLineArguments:
        "-UITestMode": false
    test:
      config: Debug
      targets:
        - HaoYunDiaryUITests
    archive:
      config: Release
